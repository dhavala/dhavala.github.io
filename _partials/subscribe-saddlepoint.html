     On submit, Mailchimp's hosted confirmation opens in a new tab. -->

  <p class="subscribe-label">Subscribe to SaddlePoint</p>
  <form action="https://github.us18.list-manage.com/subscribe/post?u=82b9a1ff5bc2e4c89a646fcea&amp;id=c48700ad96&amp;f_id=004bade6f0"
        method="post" target="_blank" novalidate>
    <input type="email" name="EMAIL" placeholder="Type your email…" aria-label="Email address" required>
    <div style="position:absolute;left:-5000px" aria-hidden="true">
      <input type="text" name="b_82b9a1ff5bc2e4c89a646fcea_c48700ad96" tabindex="-1" value="">
    </div>
    <button type="submit">Subscribe</button>
  </form>
