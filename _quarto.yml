project:
  type: website
  output-dir: _site
  resources:
    - "images/**"

website:
  title: "Soma S Dhavala"
  site-url: https://dhavala.github.io  # TODO: confirm or replace
  favicon: images/favicon.png
  search: false                        # off until there is real content
  twitter-card: true
  open-graph: true

  navbar:
    background: "#222"
    foreground: "#eee"
    left:
      - href: index.qmd
        text: Home
      - href: about/index.qmd
        text: About
      - href: research/index.qmd
        text: Research
      - href: teaching/index.qmd
        text: Teaching
      - href: consulting/index.qmd
        text: Consulting
      - href: saddlepoint/index.qmd
        text: SaddlePoint
    right:
      - icon: rss
        text: "SaddlePoint feed"
        href: saddlepoint/index.xml

  # Single global sidebar — applies to every page (unless `sidebar: false`
  # in frontmatter). Top-level sections always visible; the current
  # section auto-expands to show its sub-pages.
  sidebar:
    style: floating
    collapse-level: 1
    contents:
      - section: "About"
        href: about/index.qmd
        contents:
          - about/bio.qmd
          - about/places.qmd
          - about/contact.qmd
      - section: "Research"
        href: research/index.qmd
        contents:
          - research/publications.qmd
          - research/patents.qmd
          - research/reports.qmd
          - research/code.qmd
          - section: "Projects"
            href: research/projects/index.qmd
            contents:
              - research/projects/sample-project.qmd
              - research/projects/another-project.qmd
      - section: "Teaching"
        href: teaching/index.qmd
        contents:
          - teaching/notes.qmd
          - teaching/homeworks.qmd
          - teaching/exams.qmd
      - text: "Consulting"
        href: consulting/index.qmd
      - section: "OSS"
        href: oss/index.qmd
        contents:
          - oss/sample-tool.qmd
          - oss/another-tool.qmd
      - section: "Blogs"
        contents:
          - text: "SaddlePoint"
            href: saddlepoint/index.qmd
          - text: "Asankhya"
            href: asankhya/index.qmd

  page-footer:
    background: "#222"
    foreground: "#ccc"
    left: "Built with [Quarto](https://quarto.org)"
    center: "&copy; 2026 Soma S Dhavala"
    right:
      - icon: github
        href: https://github.com/dhavala
        aria-label: GitHub
      - icon: linkedin
        href: https://linkedin.com/in/somadhavala
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:soma.dhavala@gmail.com
        aria-label: Email

format:
  html:
    theme:
      - theme/site-tamu.scss
    toc: true
    toc-location: right
    title-block-style: default
    anchor-sections: false
    code-copy: true
    smooth-scroll: true
    highlight-style: monokai           # dark code blocks on the light page
    # Inject the skip-to-content link as the first body child for keyboard
    # / screen-reader users. Styled via .skip-link in theme SCSS.
    include-in-header:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          var skip = document.createElement('a');
          skip.href = '#quarto-document-content';
          skip.className = 'skip-link';
          skip.textContent = 'Skip to main content';
          document.body.insertBefore(skip, document.body.firstChild);
        });
        </script>
