              - research/docs/reports/rpt524.qmd
              - research/docs/reports/rpt543x.qmd
              - research/docs/reports/rpt621.qmd
              - research/docs/reports/rpt632.qmd
              - research/docs/reports/rpt689.qmd
          - research/code.qmd
          - section: "Projects"
            href: research/projects/index.qmd
            contents:
              - research/projects/sample-project.qmd
              - research/projects/another-project.qmd
      - section: "Teaching"
        href: teaching/index.qmd
        contents:
          - teaching/notes.qmd
          - teaching/homeworks.qmd
          - teaching/exams.qmd
          - section: "Archives"
            href: teaching/archives.qmd
            contents:
              - teaching/docs/archives/tutLaplace.qmd
              - teaching/docs/archives/tutGmm.qmd
              - teaching/docs/archives/tutEM.qmd
              - teaching/docs/archives/tutMCMC.qmd
              - teaching/docs/archives/tutChirp.qmd
      - text: "Consulting"
        href: consulting/index.qmd
      - section: "OSS"
        href: oss/index.qmd
        contents:
          - oss/sample-tool.qmd
          - oss/another-tool.qmd
      - section: "Blogs"
        href: blogs/index.qmd
        contents:
          - text: "SaddlePoint"
            href: saddlepoint/index.qmd
          - text: "Asankhya"
            href: asankhya/index.qmd

  page-footer:
    background: "#222"
    foreground: "#ccc"
    left: "Built with [Quarto](https://quarto.org) and [Claude](http://claude.ai/)"
    center: "&copy; 2026 Soma S Dhavala"
    right:
      - icon: github
        href: https://github.com/dhavala
        aria-label: GitHub
      - icon: linkedin
        href: https://linkedin.com/in/somasdhavala
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:soma.dhavala@iitjammu.ac.in
        aria-label: Email

format:
  html:
    theme:
      - theme/site-tamu.scss
    toc: true
    toc-location: right
    title-block-style: default
    anchor-sections: false
    code-copy: true
    smooth-scroll: true
    highlight-style: monokai           # dark code blocks on the light page
    # Inject the skip-to-content link as the first body child for keyboard
    # / screen-reader users. Styled via .skip-link in theme SCSS.
    include-in-header:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          // Skip-to-content link as the first focusable body child.
          var skip = document.createElement('a');
          skip.href = '#quarto-document-content';
          skip.className = 'skip-link';
          skip.textContent = 'Skip to main content';
          document.body.insertBefore(skip, document.body.firstChild);

          // Helper: build a <li class="breadcrumb-item"><a>Home</a></li>
          function makeHomeItem() {
            var li = document.createElement('li');
            li.className = 'breadcrumb-item';
            var a = document.createElement('a');
            a.href = '/';
            a.textContent = 'Home';
            li.appendChild(a);
            return li;
          }

          // SUB-PAGES: prepend "Home" to Quarto's existing breadcrumb so
          // every ribbon starts with Home for consistency.
          var existingBcr = document.querySelector('.quarto-title-breadcrumbs .breadcrumb');
          if (existingBcr) {
            existingBcr.insertBefore(makeHomeItem(), existingBcr.firstChild);
          }

          // SECTION INDEX PAGES: inject a trail INSIDE #title-block-header
          // so it has the exact same DOM context as Quarto's breadcrumb on
          // sub-pages. Stamp it with Quarto's own classes so every existing
          // .quarto-title-breadcrumbs CSS rule (ribbon styling, layout
          // fixes, h1 hide, mobile plain-text override) applies to it
          // identically — no parallel selectors needed, no size drift.
          // SKIP on the actual home page (/) — "Home > Home" is meaningless.
          var titleHeader = document.querySelector('#title-block-header');
          var titleBcr = document.querySelector('.quarto-title-breadcrumbs');
          var path = window.location.pathname.replace(/\/+$/, '');
          var isHome = (path === '' || path.endsWith('/index') || /\/index\.html?$/.test(path));
          if (titleHeader && !titleBcr && !isHome) {
            var h1 = titleHeader.querySelector('.quarto-title h1.title');
            if (h1) {
              var trail = document.createElement('nav');
              trail.className = 'quarto-page-breadcrumbs quarto-title-breadcrumbs d-none d-lg-block section-trail';
              trail.setAttribute('aria-label', 'breadcrumb');
              var ol = document.createElement('ol');
              ol.className = 'breadcrumb';
              ol.appendChild(makeHomeItem());
              var currentLi = document.createElement('li');
              currentLi.className = 'breadcrumb-item active';
              currentLi.textContent = h1.textContent.trim();
              ol.appendChild(currentLi);
              trail.appendChild(ol);
              titleHeader.insertBefore(trail, titleHeader.firstChild);
            }
          }
        });
        </script>
