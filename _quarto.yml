project:
  type: website
  output-dir: _site
  resources:
    - "images/**"
    - "files/**"
    - "quotes.json"

website:
  title: "Soma S Dhavala"
  site-url: https://dhavala.github.io  # TODO: confirm or replace
  favicon: images/favicon.png
  search: false                        # off until there is real content
  image: images/og-image.png           # default share preview (1200x630)
  twitter-card:
    image: images/og-image.png
    card-style: summary_large_image
  open-graph:
    image: images/og-image.png

  navbar:
    background: "#222"
    foreground: "#eee"
    left:
      - href: index.qmd
        text: Home
      - href: about/index.qmd
        text: About
      - href: research/index.qmd
        text: Research
      - href: teaching/index.qmd
        text: Teaching
      - href: consulting/index.qmd
        text: Consulting
      - href: saddlepoint/index.qmd
        text: SaddlePoint
    right:
      - icon: rss
        text: "SaddlePoint feed"
        href: saddlepoint/index.xml

  # Single global sidebar — applies to every page (unless `sidebar: false`
  # in frontmatter). Top-level sections always visible; the current
  # section auto-expands to show its sub-pages.
  sidebar:
    style: floating
    collapse-level: 1
    contents:
      - text: "About"
        href: about/index.qmd
      - section: "Research"
        href: research/index.qmd
        contents:
          - research/publications.qmd
          - research/patents.qmd
          - research/reports.qmd
          - research/projects/index.qmd
          - research/team.qmd
      - section: "Teaching"
        href: teaching/index.qmd
        contents:
          - teaching/courses.qmd
          - teaching/notes.qmd
      - text: "Consulting"
        href: consulting/index.qmd
      - text: "Software"
        href: software/index.qmd
      - section: "Blogs"
        href: blogs/index.qmd
        contents:
          - text: "SaddlePoint"
            href: saddlepoint/index.qmd
          - text: "Asankhya"
            href: asankhya/index.qmd

  page-footer:
    background: "#222"
    foreground: "#ccc"
    left: "Built with [Quarto](https://quarto.org), [Claude](http://claude.ai/) and [Codex](https://chatgpt.com/codex/)"
    center: "&copy; 2026 Soma S Dhavala"
    right:
      - icon: github
        href: https://github.com/dhavala
        aria-label: GitHub
      - icon: linkedin
        href: https://linkedin.com/in/somasdhavala
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:soma.dhavala@iitjammu.ac.in
        aria-label: Email

format:
  html:
    theme:
      - theme/site-tamu.scss
    toc: true
    toc-location: right
    title-block-style: default
    anchor-sections: false
    code-copy: true
    smooth-scroll: true
    highlight-style: monokai           # dark code blocks on the light page
    # Inject the skip-to-content link as the first body child for keyboard
    # / screen-reader users. Styled via .skip-link in theme SCSS.
    include-in-header:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          // Skip-to-content link as the first focusable body child.
          var skip = document.createElement('a');
          skip.href = '#quarto-document-content';
          skip.className = 'skip-link';
          skip.textContent = 'Skip to main content';
          document.body.insertBefore(skip, document.body.firstChild);

          // Helper: build a <li class="breadcrumb-item"><a>Home</a></li>
          function makeHomeItem() {
            var li = document.createElement('li');
            li.className = 'breadcrumb-item';
            var a = document.createElement('a');
            a.href = '/';
            a.textContent = 'Home';
            li.appendChild(a);
            return li;
          }

          // Build a <li><a href>text</a></li> crumb.
          function crumbLink(text, href) {
            var li = document.createElement('li');
            li.className = 'breadcrumb-item';
            var a = document.createElement('a');
            a.href = href; a.textContent = text;
            li.appendChild(a);
            return li;
          }
          // Ancestor crumbs for content pages that are intentionally NOT listed
          // in the sidebar (their landing page is the index). Keeps the banner
          // anchor working: Home > Section > Subsection > <page>.
          function ancestorCrumbs(p) {
            if (p.indexOf('/research/docs/reports/') >= 0)
              return [['Research', '/research/index.html'], ['Reports', '/research/reports.html']];
            if (p.indexOf('/teaching/docs/archives/') >= 0)
              return [['Teaching', '/teaching/index.html'], ['Notes', '/teaching/notes.html']];
            if (p.indexOf('/research/projects/') >= 0)
              return [['Research', '/research/index.html'], ['Projects', '/research/projects/index.html']];
            // Blog posts live one slug-level under saddlepoint/ or asankhya/ and
            // aren't listed in the sidebar — give them the full Blogs > <stream>
            // trail. The trailing slash means the stream landing pages themselves
            // (/saddlepoint, /asankhya) fall through to the next check.
            if (p.indexOf('/saddlepoint/') >= 0)
              return [['Blogs', '/blogs/index.html'], ['SaddlePoint', '/saddlepoint/index.html']];
            if (p.indexOf('/asankhya/') >= 0)
              return [['Blogs', '/blogs/index.html'], ['Asankhya', '/asankhya/index.html']];
            // Stream landing pages sit directly under Blogs.
            if (/\/saddlepoint$/.test(p) || /\/asankhya$/.test(p))
              return [['Blogs', '/blogs/index.html']];
            return [];
          }

          // SUB-PAGES: prepend "Home" to Quarto's existing breadcrumb so
          // every ribbon starts with Home for consistency.
          var existingBcr = document.querySelector('.quarto-title-breadcrumbs .breadcrumb');
          if (existingBcr) {
            existingBcr.insertBefore(makeHomeItem(), existingBcr.firstChild);
          }

          // SECTION INDEX PAGES: inject a trail INSIDE #title-block-header
          // so it has the exact same DOM context as Quarto's breadcrumb on
          // sub-pages. Stamp it with Quarto's own classes so every existing
          // .quarto-title-breadcrumbs CSS rule (ribbon styling, layout
          // fixes, h1 hide, mobile plain-text override) applies to it
          // identically — no parallel selectors needed, no size drift.
          // SKIP on the actual home page (/) — "Home > Home" is meaningless.
          var titleHeader = document.querySelector('#title-block-header');
          var titleBcr = document.querySelector('.quarto-title-breadcrumbs');
          var path = window.location.pathname.replace(/\/+$/, '');
          var isHome = (path === '' || path.endsWith('/index') || /\/index\.html?$/.test(path));
          if (titleHeader && !titleBcr && !isHome) {
            var h1 = titleHeader.querySelector('.quarto-title h1.title');
            if (h1) {
              var trail = document.createElement('nav');
              trail.className = 'quarto-page-breadcrumbs quarto-title-breadcrumbs d-none d-lg-block section-trail';
              trail.setAttribute('aria-label', 'breadcrumb');
              var ol = document.createElement('ol');
              ol.className = 'breadcrumb';
              ol.appendChild(makeHomeItem());
              ancestorCrumbs(path).forEach(function (c) { ol.appendChild(crumbLink(c[0], c[1])); });
              var currentLi = document.createElement('li');
              currentLi.className = 'breadcrumb-item active';
              currentLi.textContent = h1.textContent.trim();
              ol.appendChild(currentLi);
              trail.appendChild(ol);
              titleHeader.insertBefore(trail, titleHeader.firstChild);
            }
          }

          // SIDEBAR CONTEXT: pages that aren't sidebar entries (blog posts,
          // reports, archive tutorials, project pages) give Quarto nothing to
          // expand or highlight, so their section collapses on open. Re-derive
          // context from the same ancestorCrumbs(): its leaf crumb (SaddlePoint
          // / Asankhya / Reports / …) IS a real sidebar link, so find that link,
          // mark it active, and expand each collapsible section that wraps it.
          var sidebar = document.querySelector('nav#quarto-sidebar');
          // Skip pages Quarto already handles (they have an active link).
          if (sidebar && !sidebar.querySelector('a.sidebar-link.active')) {
            var anc = ancestorCrumbs(path);
            if (anc.length) {
              var leafTail = anc[anc.length - 1][1].replace(/^\/+/, '');   // e.g. saddlepoint/index.html
              var link = null, links = sidebar.querySelectorAll('a.sidebar-link[href]');
              for (var k = 0; k < links.length; k++) {
                var h = links[k].getAttribute('href').replace(/^(\.\.\/)+/, '').replace(/^\/+/, '');
                if (h === leafTail) { link = links[k]; break; }
              }
              if (link) {
                link.classList.add('active');
                for (var node = link.parentElement; node && node !== sidebar; node = node.parentElement) {
                  if (node.tagName === 'UL' && node.classList.contains('sidebar-section')) {
                    node.classList.add('show');
                    var toggle = node.id && sidebar.querySelector('[data-bs-target="#' + node.id + '"]');
                    if (toggle) { toggle.setAttribute('aria-expanded', 'true'); toggle.classList.remove('collapsed'); }
                  }
                }
              }
            }
          }
        });
        </script>
