project:
  type: website
  output-dir: _site
  resources:
    - "images/**"

website:
  title: "Soma S Dhavala"
  site-url: https://dhavala.github.io  # TODO: confirm or replace
  favicon: images/favicon.png
  search: false                        # off until there is real content
  twitter-card: true
  open-graph: true

  navbar:
    background: "#222"
    foreground: "#eee"
    left:
      - href: index.qmd
        text: Home
      - href: about/index.qmd
        text: About
      - href: research/index.qmd
        text: Research
      - href: teaching/index.qmd
        text: Teaching
      - href: consulting/index.qmd
        text: Consulting
      - href: interests/index.qmd
        text: Interests
      - href: posts/index.qmd
        text: Blog
    right:
      - icon: rss
        href: posts/index.xml

  sidebar:
    - id: about
      style: floating
      collapse-level: 1
      contents:
        - about/index.qmd
        - about/bio.qmd
        - about/places.qmd
        - about/contact.qmd
    - id: research
      style: floating
      collapse-level: 1
      contents:
        - research/index.qmd
        - research/publications.qmd
        - research/patents.qmd
        - research/reports.qmd
        - research/code.qmd
    - id: teaching
      style: floating
      collapse-level: 1
      contents:
        - teaching/index.qmd
        - teaching/notes.qmd
        - teaching/homeworks.qmd
        - teaching/exams.qmd
    - id: interests
      style: floating
      collapse-level: 1
      contents:
        - interests/index.qmd
        - interests/photography.qmd
        - interests/video.qmd
        - interests/acting.qmd
        - interests/volunteering.qmd

  page-footer:
    background: "#222"
    foreground: "#ccc"
    left: "Built with [Quarto](https://quarto.org)"
    center: "&copy; 2026 Soma S Dhavala"
    right:
      - icon: github
        href: https://github.com/dhavala
        aria-label: GitHub
      - icon: linkedin
        href: https://linkedin.com/in/somadhavala
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:soma.dhavala@gmail.com
        aria-label: Email

format:
  html:
    theme:
      - theme/site-tamu.scss
    toc: true
    toc-location: right
    title-block-style: default
    anchor-sections: false
    code-copy: true
    smooth-scroll: true
    # Inject the skip-to-content link as the first body child for keyboard
    # / screen-reader users. Styled via .skip-link in theme SCSS.
    include-in-header:
      text: |
        <script>
        document.addEventListener('DOMContentLoaded', function() {
          var skip = document.createElement('a');
          skip.href = '#quarto-document-content';
          skip.className = 'skip-link';
          skip.textContent = 'Skip to main content';
          document.body.insertBefore(skip, document.body.firstChild);
        });
        </script>
